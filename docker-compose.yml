services:
  postgres:
    image: postgres:16-alpine
    container_name: ssvk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssvk
      POSTGRES_USER: ssvk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssvk_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5460:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssvk -d ssvk"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ssvk-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ssvk:${POSTGRES_PASSWORD:-ssvk_password}@postgres:5432/ssvk?schema=public
      PORT: 3001
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://ssvk.sk}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ${UPLOAD_DIR:-/root/ssvk/pdfs}:/app/uploads
    ports:
      - "127.0.0.1:3001:3001"

volumes:
  postgres_data:
